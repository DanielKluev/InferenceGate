[pytest]
# Standalone pytest config for the sample-app integration test.
#
# Tells pytest:
#   * `tests_sample_app/` is its own rootdir (no shared conftest with the
#     Gate's self-tests under `tests/`).
#   * Pick up cassettes via INFERENCEGATE_CACHE_DIR (set in conftest.py to
#     an absolute path so it works regardless of pytest invocation cwd).
